<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PLTS">
  <meta name="description" content="Sistem Monitoring dan Kontrol PLTS SmartHome">
  <title>PLTS SmartHome - Masuk</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="icon" type="image/png" href="assets/icon-192.png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Login-specific overrides */
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-primary);
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    .login-page::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(88, 166, 255, 0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(63, 185, 80, 0.06) 0%, transparent 50%);
      animation: bgShift 20s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes bgShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-2%, -2%) rotate(3deg); }
    }

    .login-card {
      background: rgba(22, 27, 34, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(48, 54, 61, 0.6);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(88, 166, 255, 0.05);
      position: relative;
      z-index: 1;
      animation: fadeSlideUp 0.6s ease-out;
    }

    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.75rem;
    }

    .login-logo svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 12px rgba(88, 166, 255, 0.3));
    }

    .login-logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      letter-spacing: -0.02em;
    }

    .login-logo p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin: 0.25rem 0 0;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      padding: 0.75rem 1rem;
      padding-left: 2.5rem;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }

    .input-wrapper input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }

    .input-wrapper input::placeholder {
      color: var(--text-muted);
    }

    .input-icon {
      position: absolute;
      left: 0.75rem;
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .input-icon svg {
      width: 18px;
      height: 18px;
    }

    .password-toggle {
      position: absolute;
      right: 0.5rem;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.375rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: color var(--transition);
    }

    .password-toggle:hover {
      color: var(--text-secondary);
    }

    .password-toggle svg {
      width: 18px;
      height: 18px;
    }

    .login-btn {
      width: 100%;
      padding: 0.8rem 1.5rem;
      background: var(--accent-blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color var(--transition), transform 0.1s ease, box-shadow var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      min-height: 44px;
      margin-top: 0.5rem;
    }

    .login-btn:hover {
      background: #79b8ff;
      box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .login-btn .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .login-error {
      display: none;
      padding: 0.625rem 0.875rem;
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      border-radius: var(--radius-sm);
      color: var(--accent-red);
      font-size: 0.85rem;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    .login-error.visible {
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: 1.75rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-light);
    }

    .login-footer p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 0;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem;
        margin: 0.5rem;
      }

      .login-logo svg {
        width: 52px;
        height: 52px;
      }

      .login-logo h1 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Solar Panel -->
          <rect x="8" y="20" width="48" height="30" rx="3" fill="#1c2333" stroke="#58a6ff" stroke-width="1.5"/>
          <!-- Grid lines -->
          <line x1="24" y1="20" x2="24" y2="50" stroke="#58a6ff" stroke-width="0.8" opacity="0.5"/>
          <line x1="40" y1="20" x2="40" y2="50" stroke="#58a6ff" stroke-width="0.8" opacity="0.5"/>
          <line x1="8" y1="30" x2="56" y2="30" stroke="#58a6ff" stroke-width="0.8" opacity="0.5"/>
          <line x1="8" y1="40" x2="56" y2="40" stroke="#58a6ff" stroke-width="0.8" opacity="0.5"/>
          <!-- Sun -->
          <circle cx="48" cy="10" r="7" fill="#d29922" opacity="0.9"/>
          <line x1="48" y1="0" x2="48" y2="2" stroke="#d29922" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="55.6" y1="4" x2="54.2" y2="5.4" stroke="#d29922" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="58" y1="10" x2="56" y2="10" stroke="#d29922" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="40.4" y1="4" x2="41.8" y2="5.4" stroke="#d29922" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Sun rays to panel -->
          <line x1="44" y1="15" x2="40" y2="20" stroke="#d29922" stroke-width="0.8" opacity="0.4" stroke-dasharray="2 2"/>
          <line x1="48" y1="17" x2="48" y2="20" stroke="#d29922" stroke-width="0.8" opacity="0.4" stroke-dasharray="2 2"/>
          <!-- Stand -->
          <line x1="32" y1="50" x2="32" y2="58" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
          <line x1="24" y1="58" x2="40" y2="58" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
          <!-- Home icon at center -->
          <path d="M26 36 L32 31 L38 36 L38 43 L26 43 Z" fill="none" stroke="#3fb950" stroke-width="1.2" stroke-linejoin="round"/>
          <rect x="30" y="38" width="4" height="5" rx="0.5" fill="none" stroke="#3fb950" stroke-width="1"/>
        </svg>
        <h1>PLTS SmartHome</h1>
        <p>Monitoring &amp; Control System</p>
      </div>

      <!-- Login Form -->
      <form class="login-form" id="login-form" autocomplete="off">
        <!-- Error Message -->
        <div class="login-error" id="login-error">
          <span id="login-error-text">Nama pengguna atau kata sandi salah.</span>
        </div>

        <!-- Username -->
        <div class="form-group">
          <label for="username">Nama Pengguna</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" id="username" name="username" placeholder="Masukkan nama pengguna" required autocomplete="username" autofocus>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Kata Sandi</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" name="password" placeholder="Masukkan kata sandi" required autocomplete="current-password">
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Tampilkan kata sandi">
              <!-- Eye icon -->
              <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye off icon -->
              <svg id="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button type="submit" class="login-btn" id="login-btn">
          <span id="login-btn-text">Masuk</span>
          <div class="spinner" id="login-spinner" style="display:none"></div>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p>v1.0 &mdash; PLTS SmartHome System</p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pwa.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/rules-editor.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
